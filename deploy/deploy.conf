# deploy/deploy.conf — overrides opcionales del despliegue.
# Normalmente NO necesitas tocar nada: el dominio se autogenera con sslip.io
# a partir de la IP publica, y la BD se lee de tu .env.
#
# Descomenta y edita solo si quieres cambiar el comportamiento por defecto.

# --- Dominio (elige UNA opcion; si dejas todo vacio -> sslip.io automatico) ---
#
# Opcion A) Dominio con NOMBRE via DuckDNS (recomendado: https://vexis.duckdns.org)
#   Paso manual unico (~2 min): entra en https://www.duckdns.org, login con Google/GitHub,
#   crea el subdominio (escribe "vexis" y pulsa add domain) y copia tu token.
#   Luego rellena estas dos lineas:
# DUCKDNS_SUBDOMAIN="vexis"
# DUCKDNS_TOKEN="pega-aqui-tu-token"
#
# Opcion B) Dominio propio (registro DNS A apuntando a la IP del servidor):
# APP_DOMAIN="vexis.midominio.com"
#
# Opcion C) Nada -> dominio automatico <IP_PUBLICA>.sslip.io (cero configuracion).

# Activar HTTPS con Let's Encrypt (true/false). Si falla, el deploy sigue en HTTP.
# ENABLE_SSL="true"

# Version de PHP a instalar.
# PHP_VER="8.3"

# Zona horaria del sistema.
# TIMEZONE="Atlantic/Canary"

# Usuario del servidor web (vacio = autodetecta: www-data en Ubuntu, nginx en Oracle Linux).
# WEB_USER="www-data"
